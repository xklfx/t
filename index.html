<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساعة  الرمضانية 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-blue: #050a14;
            --white: #ffffff;
            --maghrib-color: #ff5722;
            --tv-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-blue);
            color: var(--white);
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1a2a4a 0%, #02050a 100%);
        }

        /* أيقونة تكبير الشاشة */
        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2000;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #fullscreen-btn:hover { background: var(--gold); color: white; }

        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4;
            animation: moveStars 100s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .container {
            text-align: center;
            width: 95%;
            max-width: 1500px;
        }

        .header-date {
            font-size: 2rem; /* تقليل حجم الخط */
            color: var(--gold);
            margin-bottom: 15px;
            font-weight: 500;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .main-clock {
            font-size: 10rem; /* تقليل من 12rem */
            font-weight: 800;
            margin: -5px 0;
            color: var(--white);
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
            letter-spacing: 3px;
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.07);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid rgba(212, 175, 55, 0.4);
            margin: 30px auto;
            width: fit-content;
            min-width: 500px;
            box-shadow: var(--tv-shadow);
        }

        .countdown-label { 
            font-size: 1.8rem; 
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .countdown-timer { 
            font-size: 5rem; /* تقليل من 6rem */
            color: var(--gold); 
            font-weight: 800; 
            font-family: monospace;
        }

        .prayer-times {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            width: 100%;
            margin-top: 30px;
            padding: 0 20px;
        }

        .prayer-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 10px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .prayer-card.maghrib {
            background: rgba(255, 87, 34, 0.15);
            border: 2px solid var(--maghrib-color);
            transform: scale(1.05);
        }

        .prayer-name { font-size: 1.4rem; color: #aaa; margin-bottom: 5px; display: block; }
        .prayer-time { font-size: 2.2rem; font-weight: bold; color: var(--white); }

        .supplications {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 2.2rem; /* تقليل من 3rem */
            color: rgba(255, 255, 255, 0.7);
            padding: 0 40px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        #iftar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0000 0%, #000000 100%);
            color: white;
            z-index: 3000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #iftar-overlay h1 { font-size: 6rem; color: var(--maghrib-color); }
        #iftar-overlay p { font-size: 3rem; color: var(--gold); }

        @media (max-width: 1200px) {
            .main-clock { font-size: 7rem; }
            .countdown-timer { font-size: 3.5rem; }
            .prayer-time { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <button id="fullscreen-btn" onclick="toggleFullScreen()" title="ملء الشاشة">

    </button>

    <div class="stars"></div>

    <div class="container" id="main-content">
        <div class="header-date" id="date-display">-- / -- / ----</div>
        <div class="main-clock" id="clock">00:00:00</div>
        <div class="countdown-box">
            <div class="countdown-label">المتبقي على أذان المغرب</div>
            <div class="countdown-timer" id="countdown">00:00:00</div>
        </div>
        <div class="prayer-times" id="prayer-list">
            <div class="prayer-card"><span class="prayer-name">الفجر</span><span class="prayer-time" id="fajr-t">--:--</span></div>
            <div class="prayer-card"><span class="prayer-name">الشروق</span><span class="prayer-time" id="shuruq-t">--:--</span></div>
            <div class="prayer-card"><span class="prayer-name">الظهر</span><span class="prayer-time" id="dhuhr-t">--:--</span></div>
            <div class="prayer-card"><span class="prayer-name">العصر</span><span class="prayer-time" id="asr-t">--:--</span></div>
            <div class="prayer-card maghrib"><span class="prayer-name">المغرب</span><span class="prayer-time" id="maghrib-t">--:--</span></div>
            <div class="prayer-card"><span class="prayer-name">العشاء</span><span class="prayer-time" id="isha-t">--:--</span></div>
        </div>
    </div>

    <div class="supplications" id="supplication-text">سُبْحَانَ اللَّهِ وَبِحَمْدِهِ ، سُبْحَانَ اللَّهِ الْعَظِيمِ</div>

        <p>ذهب الظمأ وابتلت العروق وثبت الأجر إن شاء الله</p>
    </div>

    <audio id="quran-audio" loop><source src="https://server8.mp3quran.net/afs/001.mp3" type="audio/mpeg"></audio>

        const supplications = [

    "اللهم إنك عفو كريم تحب العفو فاعفُ عنا",

    "يا حي يا قيوم برحمتك أستغيث، أصلح لي شأني كله",

    "اللهم آتنا في الدنيا حسنة وفي الآخرة حسنة وقنا عذاب النار",

    "اللهم اجعلنا ممن صام رمضان إيماناً واحتساباً وغُفر له ما تقدم من ذنبه",

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            h = h % 12 || 12;
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;

            const day = now.getDate();
            const month = now.getMonth() + 1;
            const weekday = new Intl.DateTimeFormat('ar-SA', { weekday: 'long' }).format(now);
            const gregorian = now.toLocaleDateString('ar-EG', {day:'numeric', month:'long', year:'numeric'});
            
            let hijri = (month === 2 && day >= 19) ? `${day - 18} رمضان 1447 هـ` : "";
            document.getElementById('date-display').innerHTML = `${weekday}، ${hijri} <br> ${gregorian}`;

            updatePrayers(now);
            if (s === "00") document.getElementById('supplication-text').textContent = supplications[Math.floor(Math.random() * supplications.length)];
        }

        function updatePrayers(now) {
            const dateStr = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
            const today = prayerData.find(d => d.date === dateStr) || prayerData[0];

            document.getElementById('fajr-t').textContent = today.fajr;
            document.getElementById('shuruq-t').textContent = today.shuruq;
            document.getElementById('dhuhr-t').textContent = today.dhuhr;
            document.getElementById('asr-t').textContent = today.asr;
            document.getElementById('maghrib-t').textContent = today.maghrib;
            document.getElementById('isha-t').textContent = today.isha;

            const [mH, mM] = today.maghrib.split(':');
            const maghribTime = new Date(now);
            maghribTime.setHours(parseInt(mH) + 12, parseInt(mM), 0, 0);

            const diff = maghribTime - now;
            if (diff > 0) {
                const hrs = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                document.getElementById('countdown').textContent = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                document.getElementById('iftar-overlay').style.display = 'none';
            } else if (diff <= 0 && diff > -7200000) {
                document.getElementById('iftar-overlay').style.display = 'flex';
            } else {
                document.getElementById('iftar-overlay').style.display = 'none';
                document.getElementById('countdown').textContent = "تقبل الله صيامكم";
            }
        }

        document.body.addEventListener('click', () => { document.getElementById('quran-audio').play(); }, { once: true });
        setInterval(updateClock, 1000);
        updateClock();
    </script>
