<style>
        :root {
            --gold: #d4af37;
            --dark-blue: #050a14;
            --white: #ffffff;
            --maghrib-color: #ff5722;
            --tv-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-blue);
            color: var(--white);
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* توسيط المحتوى لشاشات TV */
            height: 100vh;
            /* خلفية متدرجة أعمق لتناسب إضاءة التلفاز */
            background: radial-gradient(circle at center, #1a2a4a 0%, #02050a 100%);
        }

        /* تأثير النجوم المتحركة لشاشات TV */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4;
            animation: moveStars 100s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .container {
            text-align: center;
            width: 95%;
            max-width: 1600px; /* تكبير الحاوية لتناسب الشاشات العريضة */
        }

        .header-date {
            font-size: 2.5rem; /* تكبير الخط */
            color: var(--gold);
            margin-bottom: 20px;
            font-weight: 500;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .main-clock {
            font-size: 12rem; /* حجم ضخم للساعة على التلفاز */
            font-weight: 800;
            margin: -10px 0;
            color: var(--white);
            text-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
            letter-spacing: 5px;
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.07);
            padding: 30px;
            border-radius: 25px;
            border: 2px solid rgba(212, 175, 55, 0.4);
            margin: 40px auto;
            width: fit-content;
            min-width: 600px;
            box-shadow: var(--tv-shadow);
        }

        .countdown-label { 
            font-size: 2rem; 
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .countdown-timer { 
            font-size: 6rem; /* حجم ضخم للعداد */
            color: var(--gold); 
            font-weight: 800; 
            font-family: monospace; /* لجعل الأرقام ثابتة المكان */
        }

        .prayer-times {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 25px;
            width: 100%;
            margin-top: 50px;
            padding: 0 40px;
        }

        .prayer-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.5s;
        }

        .prayer-card.maghrib {
            background: rgba(255, 87, 34, 0.15);
            border: 2px solid var(--maghrib-color);
            transform: scale(1.05); /* تمييز بطاقة المغرب */
        }

        .prayer-name { 
            font-size: 1.8rem; 
            display: block; 
            margin-bottom: 10px;
            color: #aaa;
        }

        .prayer-time { 
            font-size: 2.8rem; 
            font-weight: bold; 
            color: var(--white);
        }

        .supplications {
            position: fixed;
            bottom: 40px;
            width: 100%;
            text-align: center;
            font-family: 'Tajawal', sans-serif;
            font-size: 3rem; /* تكبير دعاء شريط الأسفل */
            color: rgba(255, 255, 255, 0.7);
            padding: 0 50px;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8);
        }

        /* شاشة الأذان الكبيرة (فول سكرين للـ TV) */
        #iftar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0000 0%, #000000 100%);
            color: white;
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #iftar-overlay h1 { font-size: 8rem; margin-bottom: 30px; color: var(--maghrib-color); }
        #iftar-overlay p { font-size: 4rem; color: var(--gold); max-width: 85%; line-height: 1.5; }
        #iftar-overlay .signature { font-size: 2.5rem; margin-top: 80px; opacity: 0.6; font-style: italic; }

        /* تعديلات الشاشات المتوسطة */
        @media (max-width: 1200px) {
            .main-clock { font-size: 8rem; }
            .countdown-timer { font-size: 4rem; }
            .prayer-time { font-size: 2rem; }
        }

        /* تصميم قسم الإعلانات */
    .ads-section {
        width: 90%;
        max-width: 1400px;
        margin: 20px auto;
        position: relative;
        z-index: 10;
    }

    .ads-container {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.1); /* تأثير زجاجي */
        backdrop-filter: blur(10px);
        border-radius: 15px;
        border: 1px solid rgba(212, 175, 55, 0.3);
        padding: 15px 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        overflow: hidden;
    }

    .ads-label {
        background: var(--gold, #d4af37);
        color: #000;
        font-weight: 800;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 1.5rem;
        margin-left: 20px;
        white-space: nowrap;
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        animation: pulse-gold 2s infinite;
    }

    .ads-content {
        flex-grow: 1;
        overflow: hidden;
    }

    .ads-text {
        font-size: 2rem;
        color: #fff;
        margin: 0;
        font-weight: 500;
        /* حركة النص المتحرك (اختياري) */
        animation: marquee 15s linear infinite;
        white-space: nowrap;
    }

    /* تأثير نبض للعنوان */
    @keyframes pulse-gold {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }

    /* حركة النص من اليمين لليسار */
    @keyframes marquee {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }

    /* تعديل للشاشات الكبيرة TV */
    @media (min-width: 1900px) {
        .ads-text { font-size: 2.8rem; }
        .ads-label { font-size: 2rem; }
    }
    </style>
</head>

        function updateClock() {
    const now = new Date();
    
    // 1. نظام الساعة 12
    let hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    const ampm = hours >= 12 ? 'مساءً' : 'صباحاً';
    hours = hours % 12 || 12;
    
    document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;

    // 2. معالجة التاريخ الهجري (تثبيت 1 رمضان لليوم 19-2)
    const day = now.getDate();
    const month = now.getMonth() + 1; // فبراير هو شهر 2
    const year = now.getFullYear();
    
    let hijriDisplay = "";
    const weekday = new Intl.DateTimeFormat('ar-SA', { weekday: 'long' }).format(now);

    if (year === 2026 && month === 2 && day >= 19) {
        // حساب يوم رمضان بناءً على أن 19 فبراير هو 1 رمضان
        const ramadanDay = day - 18;
        hijriDisplay = `${weekday}، ${ramadanDay} رمضان 1447 هـ`;
    } else if (year === 2026 && month === 3) {
        // لشهر مارس (تكملة رمضان)
        const ramadanDay = day + 10; // لأن فبراير 28 يوم (28-18=10 أيام في فبراير)
        hijriDisplay = `${weekday}، ${ramadanDay} رمضان 1447 هـ`;
    } else {
        // التاريخ الطبيعي لبقية السنة
        hijriDisplay = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {
            day: 'numeric', month: 'long', year: 'numeric', weekday: 'long'
        }).format(now);
    }

    // 3. التاريخ الميلادي
    const gregorian = now.toLocaleDateString('ar-EG', {day:'numeric', month:'long', year:'numeric'});
    
    // العرض في الشاشة
    document.getElementById('date-display').innerHTML = `${hijriDisplay} <br> ${gregorian}`;

    updatePrayers(now);
    
    if (seconds === "00") {
        document.getElementById('supplication-text').textContent = supplications[Math.floor(Math.random() * supplications.length)];
    }
}

        function updatePrayers(now) {
    const dateStr = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
    const todayData = prayerData.find(d => d.date === dateStr) || prayerData[0];

    // عرض مواقيت اليوم في الجدول
    document.getElementById('fajr-t').textContent = todayData.fajr;
    document.getElementById('shuruq-t').textContent = todayData.shuruq;
    document.getElementById('dhuhr-t').textContent = todayData.dhuhr;
    document.getElementById('asr-t').textContent = todayData.asr;
    document.getElementById('maghrib-t').textContent = todayData.maghrib;
    document.getElementById('isha-t').textContent = todayData.isha;

    // توقيت مغرب اليوم (إصلاح نظام الـ 24 ساعة)
    const [mH, mM] = todayData.maghrib.split(':');
    const maghribToday = new Date(now);
    
    // تحويل الساعة 06 إلى 18 ليفهم أنها مساءً
    let hour24 = parseInt(mH);
    if (hour24 < 12) hour24 += 12; 

    maghribToday.setHours(hour24, parseInt(mM), 0, 0);

    const diff = maghribToday - now;
    const twoHoursInMs = 7200000; // ساعتين

    // المنطق البرمجي:
    if (diff > 0) {
        // العد التنازلي سيعمل الآن لأن المغرب أصبح الساعة 18:09 وليس 06:09
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        document.getElementById('countdown').textContent = 
            `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        
        if (diff <= 300000) {
            document.getElementById('countdown').style.color = "#ffeb3b";
        } else {
            document.getElementById('countdown').style.color = "var(--gold)";
        }

        document.getElementById('iftar-overlay').style.display = 'none';
        document.querySelector('.countdown-label').textContent = "المتبقي على أذان المغرب";

    } else if (diff <= 0 && diff > -twoHoursInMs) {
        document.getElementById('iftar-overlay').style.display = 'flex';
        document.getElementById('countdown').textContent = "00:00:00";
    } else {
        document.getElementById('iftar-overlay').style.display = 'none';
        document.getElementById('countdown').textContent = "تقبل الله صيامكم";
        document.getElementById('countdown').style.color = "var(--gold)";
        document.querySelector('.countdown-label').textContent = "صياماً مقبولاً وإفطاراً شهياً";
    }
}

        document.body.addEventListener('click', () => {
            const audio = document.getElementById('quran-audio');
            audio.play();
        }, { once: true });

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
